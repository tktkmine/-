<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>幻界大戦</title>

  <link
    rel="stylesheet"
    href="./style.css"
  />

</head>

<body>

  <!-- =====================
       タイトル画面
  ====================== -->

  <section
    id="title-screen"
    class="screen active"
  >

    <h1 id="game-title">
      幻界大戦
    </h1>

    <p class="subtitle">
      5つの世界が争うモンスター戦争
    </p>

    <button id="start-btn">
      GAME START
    </button>

  </section>

  <!-- =====================
       メインメニュー
  ====================== -->

  <section
    id="menu-screen"
    class="screen"
  >

    <h2>
      メインメニュー
    </h2>

    <div class="menu-buttons">

      <button id="menu-battle">
        モンスターテイム
      </button>

      <button id="menu-gacha">
        ガチャ
      </button>

      <button id="menu-home">
        マイホーム
      </button>

      <button id="menu-collection">
        モンスター図鑑
      </button>

    </div>

  </section>

  <!-- =====================
       バトル画面
  ====================== -->

  <section
    id="battle-screen"
    class="screen"
  >

    <h2>
      モンスターテイム
    </h2>

    <!-- プレイヤー -->

    <div class="battle-card">

      <h3 id="player-name">
        プレイヤー
      </h3>

      <p id="player-rank">
        Rank
      </p>

      <p id="player-desc">
        Description
      </p>

      <div class="hp-bar">

        <div
          id="player-hp-fill"
          class="hp-fill"
        ></div>

      </div>

      <p id="player-hp-text">
        HP
      </p>

    </div>

    <!-- ENEMY -->

    <div class="battle-card enemy">

      <h3 id="enemy-name">
        Enemy
      </h3>

      <p id="enemy-rank">
        Rank
      </p>

      <p id="enemy-desc">
        Description
      </p>

      <div class="hp-bar">

        <div
          id="enemy-hp-fill"
          class="hp-fill enemy-fill"
        ></div>

      </div>

      <p id="enemy-hp-text">
        HP
      </p>

    </div>

    <!-- ゲージ -->

    <div class="gauge-wrapper">

      <div
        id="gauge-bar"
        class="gauge-bar"
      ></div>

    </div>

    <p id="multiplier-text">
      倍率: x1.0
    </p>

    <button id="stop-btn">
      STOP
    </button>

    <!-- ログ -->

    <div id="battle-log">

    </div>

    <!-- 戻る -->

    <button id="battle-back-btn">

      戻る

    </button>

  </section>

  <!-- =====================
       ガチャ画面
  ====================== -->

  <section
    id="gacha-screen"
    class="screen"
  >

    <h2>
      ガチャ
    </h2>

    <button id="gacha-btn">
      ガチャを引く
    </button>

    <div
      id="gacha-result"
      class="gacha-result"
    >

      <h3 id="gacha-monster-name">

      </h3>

      <p id="gacha-monster-rank">

      </p>

      <p id="gacha-monster-world">

      </p>

      <p id="gacha-monster-desc">

      </p>

    </div>

    <button id="gacha-back-btn">

      戻る

    </button>

  </section>

  <!-- =====================
       ホーム画面
  ====================== -->

  <section
    id="home-screen"
    class="screen"
  >

    <h2>
      マイホーム
    </h2>

    <p id="home-player-name">

    </p>

    <p id="home-player-world">

    </p>

    <p id="home-player-gold">

    </p>

    <h3>
      パーティ
    </h3>

    <div id="party-container">

    </div>

    <button id="home-back-btn">

      戻る

    </button>

  </section>

  <!-- =====================
       図鑑
  ====================== -->

  <section
    id="collection-screen"
    class="screen"
  >

    <h2>
      モンスター図鑑
    </h2>

    <div
      id="collection-list"
      class="collection-list"
    >

    </div>

    <button id="collection-back-btn">

      戻る

    </button>

  </section>

  <!-- =====================
       JS
  ====================== -->

  <script
    type="module"
    src="./app.js"
  ></script>

</body>

</html>
