<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幻界大戦</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app">

    <header>
      <h1>幻界大戦</h1>
      <p class="subtitle">GENKAI TAISEN</p>
    </header>

    <main id="battle-screen">

      <!-- 敵モンスター -->
      <section class="monster enemy">

        <h2 id="enemy-name">
          敵モンスター
        </h2>

        <div class="rank" id="enemy-rank">
          A
        </div>

        <div class="hp-bar">
          <div
            id="enemy-hp-fill"
            class="hp-fill">
          </div>
        </div>

        <p id="enemy-hp-text">
          HP: 100 / 100
        </p>

        <p
          id="enemy-desc"
          class="description">
        </p>

      </section>

      <!-- ゲージ -->
      <section class="gauge-section">

        <div class="gauge-container">
          <div id="gauge-bar"></div>
        </div>

        <button id="stop-btn">
          STOP
        </button>

        <p id="multiplier-text">
          倍率: x1.0
        </p>

      </section>

      <!-- プレイヤー -->
      <section class="monster player">

        <h2 id="player-name">
          プレイヤー
        </h2>

        <div class="rank" id="player-rank">
          A
        </div>

        <div class="hp-bar">
          <div
            id="player-hp-fill"
            class="hp-fill">
          </div>
        </div>

        <p id="player-hp-text">
          HP: 100 / 100
        </p>

        <p
          id="player-desc"
          class="description">
        </p>

      </section>

      <!-- 行動ボタン -->
      <section class="actions">

        <button id="attack-btn">
          攻撃
        </button>

        <button id="skill-btn">
          固有スキル
        </button>

      </section>

      <!-- バトルログ -->
      <section class="log">

        <h3>バトルログ</h3>

        <div id="battle-log"></div>

      </section>

    </main>
  </div>

  <script
    type="module"
    src="app.js">
  </script>

</body>
</html>
